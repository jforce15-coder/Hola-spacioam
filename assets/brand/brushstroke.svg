
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" aria-hidden="true">
  <defs>
    
    <linearGradient id="brushFade" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#F5F3F0" stop-opacity="0"></stop>
      <stop offset="0.06" stop-color="#F5F3F0" stop-opacity="0.6"></stop>
      <stop offset="0.5" stop-color="#F5F3F0" stop-opacity="1"></stop>
      <stop offset="0.94" stop-color="#F5F3F0" stop-opacity="0.6"></stop>
      <stop offset="1" stop-color="#F5F3F0" stop-opacity="0"></stop>
    </linearGradient>
    <filter id="brushTexture">
      <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3"></feTurbulence>
      <feDisplacementMap in="SourceGraphic" scale="6"></feDisplacementMap>
    </filter>
  </defs>
  
  <g filter="url(#brushTexture)">
    <path d="M 60 380 C 220 120, 520 80, 760 240 S 1080 520, 1140 220" stroke="url(#brushFade)" stroke-width="78" fill="none" stroke-linecap="round"></path>
    
    <path d="M 60 380 C 220 120, 520 80, 760 240 S 1080 520, 1140 220" stroke="#F5F3F0" stroke-width="42" fill="none" stroke-linecap="round" opacity="0.45"></path>
  </g>
</svg>